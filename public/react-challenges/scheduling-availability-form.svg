<rect x="686" y="322" width="214" height="56" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<text x="714" y="356" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="15">May 6, 2026</text>

