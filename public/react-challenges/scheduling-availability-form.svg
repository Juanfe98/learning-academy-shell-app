<text x="1090" y="532" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="13">One valid slot selected, but recurrence rule still blocked</text>

<rect x="1060" y="598" width="392" height="118" rx="20" fill="#14532D"/>
<text x="1090" y="638" fill="#DCFCE7" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">UX note</text>
<text x="1090" y="672" fill="#F0FDF4" font-family="Inter, Arial, sans-serif" font-size="13">Warn without resetting the chosen time when only recurrence becomes invalid.</text>
