<text x="144" y="230" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Schedule details</text>
<text x="144" y="260" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13">Changing timezone or duration invalidates slot availability and refetches options.</text>

<text x="144" y="304" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">Timezone</text>
