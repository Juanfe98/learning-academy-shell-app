<text x="84" y="110" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18">Timezone-aware availability, recurrence rules, dependency-driven slot fetching, and clear conflict feedback.</text>
<rect x="68" y="148" width="1464" height="772" rx="28" fill="white" stroke="#CBD5E1" stroke-width="2"/>

<rect x="106" y="188" width="880" height="584" rx="24" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
