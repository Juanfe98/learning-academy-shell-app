<text x="502" y="502" fill="#991B1B" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">11:00 AM</text>
<text x="172" y="560" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="12">Slot list refreshed 8 seconds ago after duration changed from 30m to 60m.</text>

