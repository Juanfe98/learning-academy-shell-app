<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="app" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="data" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#115E59"/>
    </linearGradient>
    <linearGradient id="async" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#B45309"/>
      <stop offset="1" stop-color="#92400E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#CBD5E1"/>
    </marker>
    <marker id="arrowWarm" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#FDBA74"/>
    </marker>
  </defs>

  <rect width="1400" height="980" rx="32" fill="url(#bg)"/>
  <rect x="24" y="24" width="1352" height="932" rx="24" stroke="#334155" stroke-width="2"/>

  <text x="56" y="78" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">
    Modern Web System: Big Picture Architecture
  </text>
  <text x="56" y="112" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18">
    Read top to bottom for the request path, then rightward for async work and downstream integrations.
  </text>

  <rect x="56" y="150" width="360" height="684" rx="24" fill="#0B1220" stroke="#1E3A8A" stroke-width="2"/>
  <text x="84" y="192" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">
    1. Traffic Entry Layer
  </text>
  <text x="84" y="220" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="15">
    Gets the request onto the right path, fast and safely.
  </text>

  <rect x="84" y="254" width="304" height="86" rx="18" fill="url(#edge)" filter="url(#shadow)"/>
  <text x="108" y="288" fill="#EFF6FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">User Browser / Mobile App</text>
  <text x="108" y="315" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="15">Starts the request and receives the response.</text>

  <rect x="84" y="382" width="304" height="86" rx="18" fill="url(#edge)" filter="url(#shadow)"/>
  <text x="108" y="416" fill="#EFF6FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">DNS (Route 53)</text>
  <text x="108" y="443" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="15">Resolves the domain to the correct edge or origin.</text>

  <rect x="84" y="510" width="304" height="100" rx="18" fill="url(#edge)" filter="url(#shadow)"/>
  <text x="108" y="544" fill="#EFF6FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">CDN (CloudFront)</text>
  <text x="108" y="571" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="15">Serves cached content close to users.</text>
  <text x="108" y="594" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="15">Cache hit: fast response. Cache miss: forward to origin.</text>

  <rect x="84" y="652" width="304" height="72" rx="18" fill="url(#edge)" filter="url(#shadow)"/>
  <text x="108" y="695" fill="#EFF6FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">WAF</text>
  <text x="178" y="695" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="15">Blocks malicious traffic and abuse patterns.</text>

  <rect x="84" y="756" width="304" height="86" rx="18" fill="url(#edge)" filter="url(#shadow)"/>
  <text x="108" y="790" fill="#EFF6FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Load Balancer (ALB)</text>
  <text x="108" y="817" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="15">Routes traffic to healthy stateless app instances.</text>

  <rect x="516" y="150" width="360" height="684" rx="24" fill="#120B22" stroke="#6D28D9" stroke-width="2"/>
  <text x="544" y="192" fill="#C4B5FD" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">
    2. Application Layer
  </text>
  <text x="544" y="220" fill="#A78BFA" font-family="Inter, Arial, sans-serif" font-size="15">
    Stateless compute handles auth, validation, business logic, and orchestration.
  </text>

  <rect x="544" y="278" width="304" height="118" rx="20" fill="url(#app)" filter="url(#shadow)"/>
  <text x="570" y="314" fill="#F5F3FF" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700">API Services</text>
  <text x="570" y="342" fill="#EDE9FE" font-family="Inter, Arial, sans-serif" font-size="16">ECS Fargate or Lambda</text>
  <text x="570" y="366" fill="#EDE9FE" font-family="Inter, Arial, sans-serif" font-size="15">Stateless handlers scale horizontally.</text>

  <rect x="544" y="442" width="304" height="124" rx="20" fill="url(#app)" filter="url(#shadow)"/>
  <text x="570" y="478" fill="#F5F3FF" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700">Core Runtime Responsibilities</text>
  <text x="570" y="507" fill="#EDE9FE" font-family="Inter, Arial, sans-serif" font-size="15">Authenticate requests</text>
  <text x="570" y="531" fill="#EDE9FE" font-family="Inter, Arial, sans-serif" font-size="15">Validate input and business rules</text>
  <text x="570" y="555" fill="#EDE9FE" font-family="Inter, Arial, sans-serif" font-size="15">Read/write data and trigger async workflows</text>

  <rect x="544" y="614" width="304" height="148" rx="20" fill="url(#app)" filter="url(#shadow)"/>
  <text x="570" y="650" fill="#F5F3FF" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700">Response Assembly</text>
  <text x="570" y="679" fill="#EDE9FE" font-family="Inter, Arial, sans-serif" font-size="15">Serialize JSON / HTML</text>
  <text x="570" y="703" fill="#EDE9FE" font-family="Inter, Arial, sans-serif" font-size="15">Apply cache headers and compression</text>
  <text x="570" y="727" fill="#EDE9FE" font-family="Inter, Arial, sans-serif" font-size="15">Return sync response to the client</text>

  <rect x="976" y="150" width="368" height="684" rx="24" fill="#0D1B1A" stroke="#0F766E" stroke-width="2"/>
  <text x="1004" y="192" fill="#99F6E4" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">
    3. Data and Async Systems
  </text>
  <text x="1004" y="220" fill="#99F6E4" font-family="Inter, Arial, sans-serif" font-size="15">
    Fast reads, durable writes, background work, and external side effects live here.
  </text>

  <rect x="1004" y="262" width="148" height="110" rx="18" fill="url(#data)" filter="url(#shadow)"/>
  <text x="1030" y="300" fill="#ECFEFF" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700">Redis</text>
  <text x="1030" y="327" fill="#CCFBF1" font-family="Inter, Arial, sans-serif" font-size="15">Hot cache</text>
  <text x="1030" y="350" fill="#CCFBF1" font-family="Inter, Arial, sans-serif" font-size="15">Low-latency reads</text>

  <rect x="1180" y="262" width="136" height="110" rx="18" fill="url(#data)" filter="url(#shadow)"/>
  <text x="1202" y="300" fill="#ECFEFF" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700">DB</text>
  <text x="1202" y="327" fill="#CCFBF1" font-family="Inter, Arial, sans-serif" font-size="15">DynamoDB</text>
  <text x="1202" y="350" fill="#CCFBF1" font-family="Inter, Arial, sans-serif" font-size="15">Primary state</text>

  <rect x="1004" y="432" width="312" height="92" rx="18" fill="url(#async)" filter="url(#shadow)"/>
  <text x="1030" y="468" fill="#FFF7ED" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Queue / Event Bus</text>
  <text x="1030" y="495" fill="#FED7AA" font-family="Inter, Arial, sans-serif" font-size="15">SQS, SNS, or EventBridge decouple slow work from the request path.</text>

  <rect x="1004" y="568" width="312" height="92" rx="18" fill="url(#async)" filter="url(#shadow)"/>
  <text x="1030" y="604" fill="#FFF7ED" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Workers</text>
  <text x="1030" y="631" fill="#FED7AA" font-family="Inter, Arial, sans-serif" font-size="15">Lambda or containers process background jobs and retries.</text>

  <rect x="1004" y="706" width="148" height="100" rx="18" fill="url(#data)" filter="url(#shadow)"/>
  <text x="1030" y="742" fill="#ECFEFF" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700">S3</text>
  <text x="1030" y="769" fill="#CCFBF1" font-family="Inter, Arial, sans-serif" font-size="15">Files and exports</text>

  <rect x="1180" y="706" width="136" height="100" rx="18" fill="url(#data)" filter="url(#shadow)"/>
  <text x="1202" y="742" fill="#ECFEFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">External</text>
  <text x="1202" y="769" fill="#CCFBF1" font-family="Inter, Arial, sans-serif" font-size="15">APIs / email / AI</text>

  <path d="M236 340V382" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M236 468V510" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M236 610V652" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M236 724V756" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M388 799H544" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M848 332H1004" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M848 332C930 332 930 317 1004 317" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M848 496H1004" stroke="#FDBA74" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrowWarm)"/>
  <path d="M1160 524V568" stroke="#FDBA74" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrowWarm)"/>
  <path d="M1160 660V706" stroke="#FDBA74" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrowWarm)"/>
  <path d="M1160 660C1160 690 1248 690 1248 706" stroke="#FDBA74" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrowWarm)"/>

  <path d="M1004 317H848" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M544 688H388" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M236 842V884H1248V822" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="608" y="902" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">
    Sync response returns left to the user. Async work continues independently on the right.
  </text>

  <rect x="56" y="868" width="430" height="56" rx="14" fill="#111827" stroke="#334155"/>
  <line x1="84" y1="896" x2="144" y2="896" stroke="#CBD5E1" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="160" y="901" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="14">Primary request/response path</text>

  <rect x="514" y="868" width="430" height="56" rx="14" fill="#111827" stroke="#334155"/>
  <line x1="542" y1="896" x2="602" y2="896" stroke="#FDBA74" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrowWarm)"/>
  <text x="618" y="901" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="14">Async handoff to queues, workers, and side effects</text>

  <rect x="972" y="868" width="372" height="56" rx="14" fill="#111827" stroke="#334155"/>
  <text x="1000" y="892" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Mental model:</text>
  <text x="1092" y="892" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="14">Edge routes. App decides. Data persists. Async scales.</text>
</svg>
